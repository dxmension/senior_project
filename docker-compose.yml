  #       condition: service_healthy
  #     backend:
  #       condition: service_started
  #   networks:
  #     - app-network
  #   command: uv run celery -A nutrack.tasks.celery_app beat -l info

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5


  frontend:
    container_name: frontend_app
    restart: always
    build:
      dockerfile: Dockerfile
      context: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - 3000:3000
    depends_on:
      - backend
    networks:
      - app-network


networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
