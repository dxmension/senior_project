services:
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: qwerty12345
      POSTGRES_DB: senior_project
    ports:
      - 5434:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    container_name: backend_app
    restart: always
    build:
      dockerfile: Dockerfile
      context: ./backend
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    ports:
      - 8000:8000
    depends_on:
      db:
        condition: service_healthy  
      redis:
        condition: service_healthy
    networks:
      - app-network
    command: sh -c "uv run alembic upgrade head && uv run uvicorn --app-dir src nutrack.main:app --host 0.0.0.0 --port 8000 --reload --loop asyncio"

  # celery_worker:
