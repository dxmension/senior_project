  # celery_beat:
  #   container_name: celery_beat
  #   restart: always
  #   build:
  #     dockerfile: Dockerfile
  #     context: ./backend
  #   env_file:
  #     - ./backend/.env
  #   volumes:
  #     - ./backend:/app
  #   depends_on:
  #     db:
  #       condition: service_healthy
